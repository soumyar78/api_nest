  <rect width="32" height="32" rx="9" fill="url(#nest-grad)" />
  
  <!-- Outer nesting arc -->
  <path d="M7 16C7 11.0294 11.0294 7 16 7C20.9706 7 25 11.0294 25 16C25 20.9706 20.9706 25 16 25" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.4" />
  
  <!-- Middle nesting arc -->
  <path d="M10.5 16C10.5 12.9624 12.9624 10.5 16 10.5C19.0376 10.5 21.5 12.9624 21.5 16C21.5 19.0376 19.0376 21.5 16 21.5" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.75" />
  
  <!-- Inner core node representing nested API request/data -->
  <circle cx="16" cy="16" r="3.2" fill="#E0F2FE" />
  <circle cx="16" cy="16" r="1.8" fill="#10B981" />
  
  <defs>
    <linearGradient id="nest-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" />
